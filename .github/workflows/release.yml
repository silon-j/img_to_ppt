name: 构建并发布 Release

on:
  push:
    tags:
      - 'v*'        # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 支持在 GitHub 页面手动触发

permissions:
  contents: write   # 允许创建 Release

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: 安装依赖
        working-directory: app
        run: npm ci

      - name: 重新编译原生模块（sharp）
        working-directory: app
        run: npx electron-builder install-app-deps

      - name: 打包 DMG（Intel + Apple Silicon）
        working-directory: app
        run: npm run dist -- --mac --x64 --arm64

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.dmg
            app/dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## 安装说明

            | 机型 | 下载文件 |
            |------|----------|
            | Apple Silicon（M 系列） | `图片转PPT-arm64.dmg` |
            | Intel Mac | `图片转PPT-x64.dmg` |

            ### ⚠️ macOS 安全提示

            应用未经 Apple 官方签名，安装后需在终端执行以下命令解除限制，之后正常双击打开即可：

            ```bash
            sudo xattr -cr /Applications/图片转PPT.app
            ```
